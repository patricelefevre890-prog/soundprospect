<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Chercheur de prospects — Moodstream.AI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1D9E75;--green-dark:#0F6E56;--green-light:#E1F5EE;--green-mid:#5DCAA5;
  --white:#fff;--gray-50:#f7f9f8;--gray-100:#eef2f0;--gray-200:#d8e2de;
  --gray-400:#8fa49d;--gray-600:#4a6059;--gray-900:#0f1f1a;
  --score-high:#1D9E75;--score-med:#EF9F27;--score-low:#E24B4A;
  --radius-md:10px;--radius-lg:16px;--radius-xl:24px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-50);color:var(--gray-900);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* TOPBAR */
.topbar{background:var(--white);border-bottom:1.5px solid var(--gray-200);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100}
.logo img{height:28px;width:auto}
.tab-nav{display:flex;gap:4px}
.tab-btn{font-size:13px;padding:7px 16px;border-radius:20px;border:none;cursor:pointer;font-weight:500;transition:all 0.2s;background:transparent;color:var(--gray-400)}
.tab-btn.active{background:var(--green-light);color:var(--green-dark)}
.tab-btn:hover:not(.active){background:var(--gray-100)}

.body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:340px;flex-shrink:0;background:var(--white);border-right:1.5px solid var(--gray-200);display:flex;flex-direction:column;overflow:hidden}
.sidebar-top{padding:12px 14px;border-bottom:1px solid var(--gray-200);flex-shrink:0}
.search-row{display:flex;gap:6px;margin-bottom:10px}
.search-row input{flex:1;font-size:13px;padding:8px 10px;border-radius:var(--radius-md);border:1.5px solid var(--gray-200);background:var(--gray-50);color:var(--gray-900);outline:none}
.search-row input:focus{border-color:var(--green)}
.search-row select{font-size:12px;padding:8px 6px;border-radius:var(--radius-md);border:1.5px solid var(--gray-200);background:var(--gray-50);color:var(--gray-900);outline:none}
.btn-search{background:var(--green);color:#fff;border:none;border-radius:var(--radius-md);padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.2s}
.btn-search:hover{background:var(--green-dark)}
.btn-search:disabled{opacity:0.6;cursor:not-allowed}

.sidebar-head{padding:10px 14px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
.sidebar-title{font-size:11px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.07em;white-space:nowrap}
.count-badge{background:var(--gray-100);border-radius:20px;padding:2px 8px;font-size:11px;color:var(--gray-400);white-space:nowrap}
.btn-batch{background:var(--green);color:#fff;border:none;border-radius:var(--radius-md);padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap;display:none}
.btn-batch:hover{background:var(--green-dark)}
.btn-batch:disabled{opacity:0.6;cursor:not-allowed}

.loading-bar{display:none;padding:10px 14px;background:var(--green-light);border-bottom:1px solid var(--green-mid);font-size:12px;color:var(--green-dark);font-weight:500;align-items:center;gap:8px;flex-shrink:0}
.loading-bar.show{display:flex}
.spinner-sm{width:14px;height:14px;border:2px solid rgba(15,110,86,0.3);border-top-color:var(--green-dark);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}

.prospect-list{flex:1;overflow-y:auto;padding:8px}

/* PROSPECT CARD */
.prospect-card{background:var(--white);border:1.5px solid var(--gray-200);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:8px;transition:all 0.2s;position:relative;animation:fadeUp 0.3s ease both}
.prospect-card:hover{border-color:var(--green-mid);transform:translateY(-1px);box-shadow:0 4px 12px rgba(29,158,117,0.10)}
.prospect-card.selected{border:2px solid var(--green);box-shadow:0 0 0 3px rgba(29,158,117,0.12)}
.card-rank{position:absolute;top:10px;right:10px;font-size:11px;font-weight:600;color:var(--gray-400)}
.card-name{font-size:13px;font-weight:600;color:var(--gray-900);margin-bottom:2px;padding-right:30px}
.card-type{font-size:11px;color:var(--gray-400);margin-bottom:6px}
.card-email{font-size:11px;color:var(--green-dark);margin-bottom:8px;display:flex;align-items:center;gap:4px}
.score-bar-wrap{height:3px;background:var(--gray-100);border-radius:2px;margin-bottom:7px;overflow:hidden}
.score-bar{height:3px;border-radius:2px;background:var(--score-high)}
.score-bar.med{background:var(--score-med)}
.score-bar.low{background:var(--score-low)}
.card-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.meta-pill{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--gray-100);color:var(--gray-400)}
.btn-card-email{font-size:11px;padding:3px 9px;border-radius:10px;background:var(--green-light);color:var(--green-dark);border:1px solid var(--green-mid);cursor:pointer;font-weight:600;margin-left:auto;transition:all 0.15s}
.btn-card-email:hover{background:var(--green);color:#fff}

/* MAP */
.map-area{flex:1;position:relative;overflow:hidden}
#map-container{width:100%;height:100%}
.legend{position:absolute;bottom:16px;left:16px;background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-md);padding:8px 12px;font-size:11px;color:var(--gray-400);z-index:1000;display:none}
.legend.visible{display:block}
.legend-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.legend-row:last-child{margin-bottom:0}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* EMAIL MODAL */
.email-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.email-modal-overlay.open{display:flex}
.email-modal{background:var(--white);border-radius:var(--radius-xl);border:1.5px solid var(--gray-200);padding:24px;width:100%;max-width:580px;max-height:85vh;overflow-y:auto;animation:scaleIn 0.2s ease}
.email-modal-title{font-size:16px;font-weight:700;color:var(--gray-900);margin-bottom:4px}
.email-modal-sub{font-size:12px;color:var(--gray-400);margin-bottom:20px}
.gen-badge{background:var(--green-light);color:var(--green-dark);font-size:12px;padding:6px 12px;border-radius:var(--radius-md);display:none;align-items:center;gap:6px;margin-bottom:16px}
.gen-badge.show{display:flex}
.email-field{margin-bottom:14px}
.email-label{font-size:11px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:6px}
.email-input{width:100%;font-size:13px;padding:10px 12px;border-radius:var(--radius-md);border:1.5px solid var(--gray-200);background:var(--gray-50);color:var(--gray-900);outline:none;font-family:inherit}
.email-input:focus{border-color:var(--green)}
.email-textarea{width:100%;font-size:13px;padding:12px;border-radius:var(--radius-md);border:1.5px solid var(--gray-200);background:var(--gray-50);color:var(--gray-900);outline:none;font-family:inherit;resize:vertical;min-height:240px;line-height:1.7}
.email-textarea:focus{border-color:var(--green)}
.email-modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap}
.btn-cancel{background:none;border:1.5px solid var(--gray-200);border-radius:var(--radius-md);padding:9px 18px;font-size:13px;cursor:pointer;color:var(--gray-400);font-weight:600}
.btn-regen{background:var(--green-light);color:var(--green-dark);border:1.5px solid var(--green-mid);border-radius:var(--radius-md);padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-regen:hover{background:var(--green);color:#fff;border-color:var(--green)}
.btn-send-gmail{background:#EA4335;color:#fff;border:none;border-radius:var(--radius-md);padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-send-gmail:hover{background:#C5221F}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:10px;color:var(--gray-400);font-size:13px;text-align:center;padding:20px}

/* BATCH PROGRESS */
.batch-progress{display:none;position:fixed;bottom:20px;right:20px;background:var(--white);border:1.5px solid var(--gray-200);border-radius:var(--radius-lg);padding:16px 20px;z-index:600;min-width:260px;box-shadow:0 8px 24px rgba(0,0,0,0.12);animation:fadeUp 0.3s ease}
.batch-progress.show{display:block}
.batch-progress-title{font-size:13px;font-weight:600;color:var(--gray-900);margin-bottom:8px}
.batch-bar-wrap{height:4px;background:var(--gray-100);border-radius:2px;overflow:hidden;margin-bottom:6px}
.batch-bar{height:4px;background:linear-gradient(90deg,var(--green),var(--green-mid));border-radius:2px;width:0%;transition:width 0.3s}
.batch-step{font-size:11px;color:var(--gray-400)}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

// ── SCORING ──────────────────────────────────────────────────────────────────
const SECTOR_SCORES = {bar:100,pub:100,restaurant:90,cafe:85,nightclub:100,fast_food:75,ice_cream:70,clothes:70,shoes:65,hairdresser:80,beauty:80,mall:90,supermarket:65,bakery:65,sports:60,fitness:75,hotel:85,hostel:75,guest_house:60,office:30,school:20,hospital:15,pharmacy:55,bank:20,doctors:60,dentist:65,physiotherapist:60,spa:85,massage:85,parking:50};
const MUSIC_PROB = {bar:95,pub:95,nightclub:99,restaurant:80,cafe:75,fast_food:60,ice_cream:50,clothes:85,shoes:80,hairdresser:90,beauty:90,fitness:80,hotel:75,hostel:70,sports:65,mall:85,supermarket:55,bakery:40,office:20,school:15,hospital:5,pharmacy:40,bank:5,doctors:35,dentist:40,physiotherapist:45,spa:90,massage:90,parking:30};
const TYPE_LABELS = {bar:'Bar',pub:'Pub',restaurant:'Restaurant',cafe:'Café',nightclub:'Boîte de nuit',fast_food:'Fast-food',ice_cream:'Glacier',clothes:'Vêtements',shoes:'Chaussures',hairdresser:'Coiffeur',beauty:'Institut beauté',mall:'Centre commercial',supermarket:'Supermarché',bakery:'Boulangerie',sports:'Sport',fitness:'Fitness',hotel:'Hôtel',hostel:'Auberge',guest_house:"Chambre d'hôte",office:'Bureau',school:'École',hospital:'Hôpital',pharmacy:'Pharmacie',bank:'Banque',doctors:'Cabinet médical',dentist:'Cabinet dentaire',physiotherapist:'Kiné',spa:'Spa',massage:'Massage',parking:'Parking'};

function computeScore(amenity, shop, area) {
  const t = amenity || shop;
  const surfaceScore = Math.min(100, area ? Math.round(area/5) : 40);
  const sectorScore = SECTOR_SCORES[t] || 30;
  const musicScore = MUSIC_PROB[t] || 25;
  return { total: Math.round(surfaceScore*0.25 + sectorScore*0.40 + musicScore*0.35), surfaceScore, sectorScore, musicScore };
}

function scoreColor(s) { return s>=70?'#1D9E75':s>=45?'#EF9F27':'#E24B4A'; }
function barClass(s) { return s>=70?'':s>=45?'med':'low'; }

function haversine(lat1,lon1,lat2,lon2) {
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

// ── MAP ───────────────────────────────────────────────────────────────────────
function initMap(lat, lon) {
  if (!map) {
    map = L.map('map-container').setView([lat, lon], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap', maxZoom:19 }).addTo(map);
  } else { map.setView([lat, lon], 15); }
}

function clearMarkers() {
  markers.forEach(m => map && map.removeLayer(m));
  markers = [];
  if (radiusCircle && map) { map.removeLayer(radiusCircle); radiusCircle = null; }
}

// ── GEOCODE + OSM ─────────────────────────────────────────────────────────────
async function geocode(city) {
  const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city)}&format=json&limit=1`, { headers:{'Accept-Language':'fr','User-Agent':'Moodstream/1.0'} });
  const d = await r.json();
  return d.length ? { lat:parseFloat(d[0].lat), lon:parseFloat(d[0].lon) } : null;
}

async function fetchPlaces(lat, lon, radius) {
  const r = parseInt(radius);
  const query = `[out:json][timeout:30];
(
  node["amenity"~"bar|pub|restaurant|cafe|nightclub|fast_food|ice_cream|hotel|hostel|guest_house|pharmacy|doctors|dentist|physiotherapist|parking"]["email"](around:${r},${lat},${lon});
  node["shop"~"clothes|shoes|hairdresser|beauty|mall|supermarket|bakery|sports|fitness|massage|spa"]["email"](around:${r},${lat},${lon});
  way["amenity"~"bar|pub|restaurant|cafe|nightclub|fast_food|ice_cream|hotel|hostel|guest_house|pharmacy|doctors|dentist"]["email"](around:${r},${lat},${lon});
  way["shop"~"clothes|shoes|hairdresser|beauty|mall|supermarket|bakery|sports|fitness|massage|spa"]["email"](around:${r},${lat},${lon});
);
out center tags;`;
  const resp = await fetch('https://overpass-api.de/api/interpreter', { method:'POST', body:'data='+encodeURIComponent(query) });
  const data = await resp.json();
  return data.elements || [];
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
async function runSearch() {
  const city = document.getElementById('city-input').value.trim();
  const radius = document.getElementById('radius-sel').value;
  if (!city) return;

  const btn = document.getElementById('btn-search');
  btn.disabled = true;
  showLoading('Recherche des établissements avec email...');
  document.getElementById('prospect-list').innerHTML = '<div class="empty-state"><div class="spinner-sm" style="width:20px;height:20px;margin:0 auto 8px"></div>Recherche en cours...</div>';
  document.getElementById('btn-batch').style.display = 'none';
  document.getElementById('count-badge').textContent = '...';

  try {
    const geo = await geocode(city);
    if (!geo) { document.getElementById('prospect-list').innerHTML = '<div class="empty-state">Ville introuvable</div>'; return; }

    initMap(geo.lat, geo.lon);
    clearMarkers();

    radiusCircle = L.circle([geo.lat, geo.lon], { radius:parseInt(radius), color:'#1D9E75', fillColor:'#1D9E75', fillOpacity:0.07, weight:1.5 }).addTo(map);
    L.marker([geo.lat, geo.lon], { icon:L.divIcon({ className:'', html:'<div style="width:12px;height:12px;border-radius:50%;background:#1D9E75;border:2px solid white;"></div>', iconSize:[12,12], iconAnchor:[6,6] }) }).addTo(map);

    const elements = await fetchPlaces(geo.lat, geo.lon, radius);

    allProspects = elements.map((el, i) => {
      const lat = el.lat || el.center?.lat, lon = el.lon || el.center?.lon;
      if (!lat || !lon) return null;
      const amenity = el.tags?.amenity || '', shop = el.tags?.shop || '';
      const email = el.tags?.email || el.tags?.['contact:email'] || '';
      if (!email) return null;
      const area = el.tags?.['building:area'] ? parseInt(el.tags['building:area']) : null;
      const scores = computeScore(amenity, shop, area);
      return {
        _idx: i, lat, lon,
        name: el.tags?.name || '',
        amenity, shop, area, scores,
        dist: haversine(geo.lat, geo.lon, lat, lon),
        email,
        phone: el.tags?.phone || el.tags?.['contact:phone'] || '',
        website: el.tags?.website || el.tags?.['contact:website'] || '',
        address: el.tags?.['addr:street'] ? `${el.tags['addr:housenumber']||''} ${el.tags['addr:street']}`.trim() : '',
        selected: false
      };
    }).filter(Boolean);

    allProspects.sort((a, b) => b.scores.total - a.scores.total);
    allProspects.forEach((p, i) => p._idx = i);

    // Add markers
    allProspects.forEach(p => {
      const color = scoreColor(p.scores.total);
      const m = L.marker([p.lat, p.lon], {
        icon: L.divIcon({ className:'', html:`<div style="width:10px;height:10px;border-radius:50%;background:${color};border:1.5px solid white;cursor:pointer;"></div>`, iconSize:[10,10], iconAnchor:[5,5] })
      });
      m.on('click', () => openEmailModal(p));
      m.addTo(map);
      markers.push(m);
    });

    map.fitBounds(radiusCircle.getBounds(), { padding:[20,20] });
    document.getElementById('legend').classList.add('visible');
    hideLoading();
    renderList();
  } catch(e) {
    hideLoading();
    document.getElementById('prospect-list').innerHTML = '<div class="empty-state">Erreur de chargement. Réessaie.</div>';
    console.error(e);
  } finally { btn.disabled = false; }
}

function renderList() {
  document.getElementById('count-badge').textContent = allProspects.length;
  const list = document.getElementById('prospect-list');

  if (!allProspects.length) {
    list.innerHTML = '<div class="empty-state"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Aucun établissement avec email dans cette zone.<br><span style="font-size:11px">Essayez un rayon plus grand.</span></div>';
    document.getElementById('btn-batch').style.display = 'none';
    return;
  }

  document.getElementById('btn-batch').style.display = 'block';

  list.innerHTML = allProspects.map((p, i) => `
    <div class="prospect-card${p.selected?' selected':''}" style="animation-delay:${i*0.03}s">
      <span class="card-rank">#${i+1}</span>
      <div class="card-name">${p.name || '(sans nom)'}</div>
      <div class="card-type">${TYPE_LABELS[p.amenity] || TYPE_LABELS[p.shop] || p.amenity || p.shop || '—'}</div>
      <div class="card-email">📧 ${p.email}</div>
      <div class="score-bar-wrap"><div class="score-bar ${barClass(p.scores.total)}" style="width:${p.scores.total}%"></div></div>
      <div class="card-meta">
        <span class="meta-pill">Score ${p.scores.total}/100</span>
        <span class="meta-pill">${p.dist}m</span>
        ${p.phone ? `<span class="meta-pill">📞</span>` : ''}
        <button class="btn-card-email" onclick="openEmailModal(allProspects[${p._idx}])">✉️ Email</button>
      </div>
    </div>`).join('');
}

// ── EMAIL MODAL ───────────────────────────────────────────────────────────────
async function openEmailModal(prospect) {
  currentEmailProspect = prospect;
  document.getElementById('email-to').value = prospect.email || '';
  document.getElementById('email-subject').value = '';
  document.getElementById('email-body').value = '';
  document.getElementById('gen-badge').classList.add('show');
  document.getElementById('email-modal-overlay').classList.add('open');

  try {
    const result = await callClaude('email', { prospect });
    if (result?.objet && result?.corps) {
      document.getElementById('email-subject').value = result.objet;
      document.getElementById('email-body').value = result.corps;
    }
  } catch(e) {
    document.getElementById('email-subject').value = `${prospect.name || 'Votre établissement'} — Moodstream.ai`;
    document.getElementById('email-body').value = `Bonjour,

Je me permets de vous contacter au sujet de la diffusion musicale dans votre établissement.

Je m'appelle Arnaud, et je travaille chez Moodstream.ai, une solution belge qui permet aux commerces de diffuser une musique adaptée à chaque moment de leur journée, 100% libre de droits — ce qui vous permet de supprimer les redevances UNISONO.

Si le sujet vous intéresse, je serais ravi d'en discuter avec vous.

Cordialement`;
  } finally {
    document.getElementById('gen-badge').classList.remove('show');
  }
}

async function regenEmail() {
  if (!currentEmailProspect) return;
  document.getElementById('gen-badge').classList.add('show');
  try {
    const result = await callClaude('email', { prospect: currentEmailProspect });
    if (result?.objet && result?.corps) {
      document.getElementById('email-subject').value = result.objet;
      document.getElementById('email-body').value = result.corps;
    }
  } catch(e) { console.error(e); }
  finally { document.getElementById('gen-badge').classList.remove('show'); }
}

function openGmail() {
  const to = encodeURIComponent(document.getElementById('email-to').value || '');
  const subject = encodeURIComponent(document.getElementById('email-subject').value);
  const body = encodeURIComponent(document.getElementById('email-body').value);
  window.open(`https://mail.google.com/mail/u/info%40moodstreamai.com/?view=cm&fs=1&to=${to}&su=${subject}&body=${body}`, '_blank');
}

function closeEmailModal() { document.getElementById('email-modal-overlay').classList.remove('open'); currentEmailProspect = null; }
function handleModalClick(e) { if (e.target === document.getElementById('email-modal-overlay')) closeEmailModal(); }

// ── BATCH ─────────────────────────────────────────────────────────────────────
async function createAllDrafts() {
  if (!allProspects.length) return;
  const btn = document.getElementById('btn-batch');
  btn.disabled = true;
  const prog = document.getElementById('batch-progress');
  prog.classList.add('show');

  let done = 0;
  for (const p of allProspects) {
    document.getElementById('batch-title').textContent = `Génération ${done+1}/${allProspects.length}`;
    document.getElementById('batch-bar').style.width = `${Math.round((done/allProspects.length)*100)}%`;
    document.getElementById('batch-step').textContent = p.name || p.email;
    try {
      const result = await callClaude('email', { prospect: p });
      if (result?.objet && result?.corps) {
        const to = encodeURIComponent(p.email);
        const subject = encodeURIComponent(result.objet);
        const body = encodeURIComponent(result.corps);
        window.open(`https://mail.google.com/mail/u/info%40moodstreamai.com/?view=cm&fs=1&to=${to}&su=${subject}&body=${body}`, '_blank');
        await new Promise(r => setTimeout(r, 2000));
      }
    } catch(e) { console.error('Failed:', p.name, e); }
    done++;
  }

  document.getElementById('batch-bar').style.width = '100%';
  document.getElementById('batch-title').textContent = `✅ ${done} brouillons créés !`;
  document.getElementById('batch-step').textContent = 'Vérifiez vos brouillons Gmail';
  btn.disabled = false;
  setTimeout(() => { prog.classList.remove('show'); btn.textContent = '📧 Tous en brouillons'; }, 4000);
}

// ── CLAUDE API ────────────────────────────────────────────────────────────────
async function callClaude(action, data) {
  const response = await fetch('/.netlify/functions/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, data })
  });
  if (!response.ok) throw new Error('API error ' + response.status);
  return await response.json();
}

function showLoading(msg) { document.getElementById('loading-bar').classList.add('show'); document.getElementById('loading-text').textContent = msg; }
function hideLoading() { document.getElementById('loading-bar').classList.remove('show'); }

document.getElementById('city-input').addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });
</script>
